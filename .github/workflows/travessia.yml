name: Relatorio Executivo de Tasks Mensal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 28 * *" # todo dia 28 às 18h

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Buscar dados
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🔍 Buscando dados..."

          gh api graphql -f query='
          {
            user(login: "MatheusAvelar") {
              projectsV2(first: 20) {
                nodes {
                  title
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          title
                          state
                          createdAt
                          closedAt
                          assignees(first: 5) {
                            nodes {
                              login
                            }
                          }
                        }
                      }
                      fieldValues(first: 10) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }' > report.json

      - name: Gerar Relatório
        run: |
          echo "# 📊 Relatório Mensal por Projeto" > report.md

          jq -r '
          .data.user.projectsV2.nodes[]
          | {
              project: .title,
              items: [.items.nodes[]]
            }
          | "## 📁 Projeto: \(.project)\n",

            "### 📌 Visão Geral",
            "- Total de Tasks: \(.items | length)",
            "- Tasks Abertas: \(.items | map(select(.content.state == "OPEN")) | length)",
            "- Tasks Fechadas: \(.items | map(select(.content.state == "CLOSED")) | length)",

            "\n### 📊 Distribuição por Status",
            (
              .items
              | group_by(.fieldValues.nodes[0]?.name)
              | map({
                  status: (.[0].fieldValues.nodes[0]?.name // "Sem Status"),
                  count: length
                })
              | .[] | "- \(.status): \(.count)"
            ),

            "\n### 👤 Distribuição por Responsável",
            (
              .items
              | group_by(.content.assignees.nodes[0]?.login)
              | map({
                  user: (.[0].content.assignees.nodes[0]?.login // "Não atribuído"),
                  count: length
                })
              | .[] | "- \(.user): \(.count)"
            ),

            "\n-----------------------------------\n"
          ' report.json >> report.md

      - name: Publicar no Summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload do relatório
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-executivo
          path: report.md
