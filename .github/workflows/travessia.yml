name: Relatorio Executivo de Tasks Mensal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 28 * *"

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Buscar dados
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🔍 Buscando dados..."

          gh api graphql -f query='
          {
            user(login: "MatheusAvelar") {
              projectsV2(first: 20) {
                nodes {
                  title
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          title
                          state
                          createdAt
                          closedAt
                          assignees(first: 5) {
                            nodes {
                              login
                            }
                          }
                        }
                      }
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }
                          ... on ProjectV2ItemFieldUserValue {
                            users(first: 5) {
                              nodes {
                                login
                              }
                            }
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }' > report.json

      - name: Gerar Relatório
        run: |
          echo "# 📊 Relatório Mensal por Projeto" > report.md

          jq -r '
          # -------------------------
          # 🔹 FUNÇÃO: STATUS (coluna)
          # -------------------------
          def get_status:
            (
              .fieldValues.nodes[]
              | select(
                  (.field.name == "Status") or
                  (.field.name == "Stage") or
                  (.field.name == "Pipeline")
                )
              | .name
            ) // "Sem Status";

          # -------------------------
          # 🔹 FUNÇÃO: RESPONSÁVEL
          # -------------------------
          def get_assignee:
            (
              # 1. Issue (normal)
              .content.assignees.nodes[0]?.login
            )
            //
            (
              # 2. Draft item (campo do projeto)
              .fieldValues.nodes[]
              | select(
                  (.field.name == "Assignees") or
                  (.field.name == "Responsável") or
                  (.field.name == "Responsáveis")
                )
              | .users.nodes[0]?.login
            )
            // "Não atribuído";

          # -------------------------
          # 🔹 LOOP POR PROJETO
          # -------------------------
          .data.user.projectsV2.nodes[]
          | {
              project: .title,
              items: [.items.nodes[]]
            }

          | "## 📁 Projeto: \(.project)\n",

            # -------------------------
            # 📌 VISÃO GERAL
            # -------------------------
            "### 📌 Visão Geral",
            "- Total de Tasks: \(.items | length)",
            "- Tasks Abertas: \(.items | map(select(.content.state == "OPEN")) | length)",
            "- Tasks Fechadas: \(.items | map(select(.content.state == "CLOSED")) | length)",

            # -------------------------
            # 📊 STATUS (COLUNA)
            # -------------------------
            "\n### 📊 Distribuição por Status (Coluna)",
            (
              .items
              | map(. + { status: (get_status) })
              | group_by(.status)
              | map({
                  status: .[0].status,
                  count: length
                })
              | .[] | "- \(.status): \(.count)"
            ),

            # -------------------------
            # 👤 RESPONSÁVEL
            # -------------------------
            "\n### 👤 Distribuição por Responsável",
            (
              .items
              | map(. + { user: (get_assignee) })
              | group_by(.user)
              | map({
                  user: .[0].user,
                  count: length
                })
              | .[] | "- \(.user): \(.count)"
            ),

            "\n-----------------------------------\n"
          ' report.json >> report.md

      - name: Publicar no Summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload do relatório
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-executivo
          path: report.md
