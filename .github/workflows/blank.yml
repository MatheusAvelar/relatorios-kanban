name: Listar Projetos

on:
  workflow_dispatch:

jobs:
  listar:
    runs-on: ubuntu-latest

    steps:
      - name: Buscar projetos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Buscando projetos..."

          gh api graphql -f query='
          {
            user(login: "MatheusAvelar") {
              projectsV2(first: 20) {
                nodes {
                  title
                  number
                  url
                }
              }
            }
          }' > projetos.json

      - name: Exibir projetos
        run: |
          echo "📊 Projetos encontrados:"
          jq -r '
          .data.user.projectsV2.nodes[] |
          "📁 \(.title) | ID: \(.number) | URL: \(.url)"
          ' projetos.json

      - name: Publicar no Summary
        run: |
          echo "# 📊 Lista de Projetos" >> $GITHUB_STEP_SUMMARY

          jq -r '
          .data.user.projectsV2.nodes[] |
          "- 📁 **\(.title)** (ID: \(.number))"
          ' projetos.json >> $GITHUB_STEP_SUMMARY
