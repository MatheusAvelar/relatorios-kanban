name: Relatorio de Tasks

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Buscar dados do projeto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql -f query='
          {
            user(login: "MatheusAvelar") {
              projectsV2(first: 10) {
                nodes {
                  title
                  number
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          title
                          state
                          url
                        }
                      }
                      fieldValues(first: 10) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }' > report.json

      - name: Filtrar projeto correto (ID 2)
        run: |
          jq '.data.user.projectsV2.nodes[] | select(.number == 2)' report.json > project.json

      - name: Gerar Markdown
        run: |
          echo "# 📊 Relatório de Tasks" > report.md

          jq -r '
          "## 🗂 Projeto: " + .title + "\n" +
          (
            .items.nodes[] |
            "- \(.content?.title // "Sem título") | Status: \(.fieldValues.nodes[]?.name // "Sem Status") | State: \(.content?.state // "N/A")"
          )
          ' project.json >> report.md

      - name: Exibir relatório
        run: cat report.md
