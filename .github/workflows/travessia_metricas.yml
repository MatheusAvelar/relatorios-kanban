name: Relatorio Executivo Avancado Fast

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar dependências
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Buscar dados (OTIMIZADO)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🚀 Buscando projeto específico..."

          gh api graphql -f query='
          {
            user(login: "MatheusAvelar") {
              projectsV2(first: 10) {
                nodes {
                  title
                  items(first: 100) {
                    nodes {
                      createdAt
                      content {
                        ... on Issue {
                          state
                          createdAt
                        }
                      }
                      fieldValues(first: 10) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }
                          ... on ProjectV2ItemFieldUserValue {
                            users(first: 1) {
                              nodes {
                                login
                              }
                            }
                            field {
                              ... on ProjectV2FieldCommon {
                                name
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }' > report.json

      - name: Gerar relatório (FAST)
        run: |
          echo "# 📊 Dashboard de Tasks" > report.md

          jq -r '
          def now: now;

          def get_status:
            (
              .fieldValues.nodes[]
              | select(.field.name == "Status")
              | .name
            ) // "Sem Status";

          def get_created:
            (.content.createdAt // .createdAt);

          def is_done:
            (get_status | ascii_downcase) == "done";

          .data.user.projectsV2.nodes[]
          | select(.title == "Sistema de Monitoramento Python")
          | .items.nodes

          | map({
              status: (get_status),
              created: (get_created)
            })

          | . as $items

          # -------------------------
          # MÉTRICAS (uma única passada)
          # -------------------------
          | (
              reduce $items[] as $i (
                {
                  total: 0,
                  done: 0,
                  open: 0,
                  throughput: 0,
                  aging: 0,
                  lead_sum: 0,
                  lead_count: 0
                };

                .total += 1 |

                if $i.status == "Done" then
                  .done += 1 |

                  (
                    (now - ($i.created | fromdateiso8601)) / 86400
                  ) as $lt |

                  .lead_sum += $lt |
                  .lead_count += 1 |

                  if (now - ($i.created | fromdateiso8601)) <= 2592000 then
                    .throughput += 1
                  else . end

                else
                  .open += 1 |

                  if (now - ($i.created | fromdateiso8601)) > 604800 then
                    .aging += 1
                  else . end
                end
              )
            )

          | . as $m

          # -------------------------
          # CÁLCULOS
          # -------------------------
          | ($m.lead_sum / ($m.lead_count + 0.0001)) as $lead

          | (
              ($m.throughput * 5)
              + (30 - $lead)
              - ($m.aging * 2)
            ) as $score

          # -------------------------
          # OUTPUT
          # -------------------------
          | "
## 📁 Projeto: Sistema de Monitoramento Python

### 📌 Visão Geral
- Total: \($m.total)
- Abertas: \($m.open)
- Fechadas: \($m.done)

### 🔥 Throughput
- \($m.throughput)

### ⏱️ Lead Time
- \($lead | floor) dias

### 🐢 Aging
- \($m.aging)

### 📈 Score
- \($score | floor)

### 🏷️ Classificação
- \(if $score >= 80 then "🚀 Alta"
   elif $score >= 50 then "👍 Saudável"
   elif $score >= 20 then "⚠️ Atenção"
   else "🔥 Crítico"
   end)
"
          ' report.json >> report.md

      - name: Publicar
        run: cat report.md >> $GITHUB_STEP_SUMMARY
