name: Relatorio Executivo - Projeto Específico

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 28 * *"

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Buscar dados
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api graphql -f query='
          {
            user(login: "MatheusAvelar") {
              projectsV2(query: "Sistema de Monitoramento Python", first: 1) {
                nodes {
                  title
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          state
                          createdAt
                          closedAt
                          assignees(first: 1) {
                            nodes { login }
                          }
                        }
                      }
                      fieldValues(first: 10) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                          ... on ProjectV2ItemFieldUserValue {
                            users(first: 1) {
                              nodes { login }
                            }
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }' > report.json

      - name: Gerar relatório
        run: |
          echo "# 📊 Relatório do Projeto" > report.md

          jq -r '
          def get_status:
            first(
              .fieldValues.nodes[]
              | select(.field.name == "Status")
              | .name
            ) // "Sem Status";

          def get_user:
            .content.assignees.nodes[0]?.login // "Não atribuído";

          .data.user.projectsV2.nodes[]
          | {
              project: .title,
              items: (
                .items.nodes
                | map(select(.content != null))
                | map({
                    state: .content.state,
                    status: get_status,
                    user: get_user,
                    createdAt: .content.createdAt,
                    closedAt: .content.closedAt
                  })
              )
            }

          | "## Projeto: \(.project)",
            "- Total: \(.items | length)",
            "- Abertas: \(.items | map(select(.state == "OPEN")) | length)",
            "- Fechadas: \(.items | map(select(.state == "CLOSED")) | length)",

            "\n## Status",
            (
              .items
              | sort_by(.status)
              | group_by(.status)
              | map("- \(.[0].status): \(length)")
              | .[]
            ),

            "\n## Responsáveis",
            (
              .items
              | sort_by(.user)
              | group_by(.user)
              | map("- \(.[0].user): \(length)")
              | .[]
            )
          ' report.json >> report.md

          echo "\n# 📊 Dashboard de Produto" >> report.md

          jq -r '
          def to_month: .[0:7];

          def lead_time:
            if (.closedAt != null and .createdAt != null) then
              ((.closedAt | fromdateiso8601) - (.createdAt | fromdateiso8601)) / 86400
            else null end;

          .data.user.projectsV2.nodes[].items.nodes
          | map(select(.content != null))
          | map({
              createdAt: .content.createdAt,
              closedAt: .content.closedAt,
              state: .content.state,
              user: (.content.assignees.nodes[0]?.login // "N/A")
            })

          | {
              created: map(select(.createdAt != null)),
              closed: map(select(.closedAt != null)),
              all: .
            }

          # Criadas por mês
          | "\n## Criadas por mês",
            (
              .created
              | map(.createdAt | to_month)
              | sort
              | group_by(.)
              | map("- \(.[0]): \(length)")
              | .[]
            ),

          # Finalizadas por mês
          "\n## Finalizadas por mês",
            (
              .closed
              | map(.closedAt | to_month)
              | sort
              | group_by(.)
              | map("- \(.[0]): \(length)")
              | .[]
            ),

          # Lead time
          "\n## Lead Time Médio",
            (
              .closed
              | map(. + { lt: lead_time })
              | map(select(.lt != null))
              | if length > 0 then
                  (map(.lt) | add / length | floor | "- Média: \(.) dias")
                else
                  "- Sem dados"
                end
            ),

          # Aging
          "\n## Tasks antigas (>7 dias)",
            (
              .all
              | map(select(.state == "OPEN"))
              | length
              | "- Total abertas: \(.)"
            ),

          # Produtividade
          "\n## Produtividade",
            (
              .all
              | sort_by(.user)
              | group_by(.user)
              | map("- \(.[0].user): \(length)")
              | .[]
            )
          ' report.json >> report.md

      - name: Publicar
        run: cat report.md >> $GITHUB_STEP_SUMMARY
