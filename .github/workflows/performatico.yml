name: Relatorio Executivo - Projeto Específico

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 28 * *"

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Buscar dados (filtrado por projeto)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🔍 Buscando dados do projeto específico..."

          gh api graphql -f query='
          {
            user(login: "MatheusAvelar") {
              projectsV2(query: "Sistema de Monitoramento Python", first: 1) {
                nodes {
                  title
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          state
                          assignees(first: 1) {
                            nodes { login }
                          }
                        }
                      }
                      fieldValues(first: 10) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field {
                              ... on ProjectV2FieldCommon { name }
                            }
                          }
                          ... on ProjectV2ItemFieldUserValue {
                            users(first: 1) {
                              nodes { login }
                            }
                            field {
                              ... on ProjectV2FieldCommon { name }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }' > report.json

      - name: Gerar Relatório
        run: |
          echo "# 📊 Relatório do Projeto" > report.md

          jq -r '
          def get_status:
            first(
              .fieldValues.nodes[]
              | select(
                  (.field.name == "Status") or
                  (.field.name == "Stage") or
                  (.field.name == "Pipeline")
                )
              | .name
            ) // "Sem Status";

          def get_assignee:
            (
              .content.assignees.nodes[0]?.login
            ) //
            (
              first(
                .fieldValues.nodes[]
                | select(
                    (.field.name == "Assignees") or
                    (.field.name == "Responsável") or
                    (.field.name == "Responsáveis")
                  )
                | .users.nodes[0]?.login
              )
            ) // "Não atribuído";

          .data.user.projectsV2.nodes[]
          | {
              project: .title,
              items: (
                .items.nodes
                | map(select(.content != null))
                | map({
                    state: .content.state,
                    status: (get_status),
                    user: (get_assignee)
                  })
              )
            }

          | "## 📁 Projeto: \(.project)\n",

            "### 📌 Visão Geral",
            "- Total de Tasks: \(.items | length)",
            "- Tasks Abertas: \(.items | map(select(.state == "OPEN")) | length)",
            "- Tasks Fechadas: \(.items | map(select(.state == "CLOSED")) | length)",

            "\n### 📊 Distribuição por Status",
            (
              .items
              | group_by(.status)
              | map("- \(.[0].status): \(length)")
              | .[]
            ),

            "\n### 👤 Distribuição por Responsável",
            (
              .items
              | group_by(.user)
              | map("- \(.[0].user): \(length)")
              | .[]
            ),

            "\n-----------------------------------\n"
          echo "\n# 📊 Dashboard de Produto\n" >> report.md
          
          jq -r '
          def to_month(date):
            date[0:7];
          
          def lead_time_days:
            if (.content.createdAt != null and .content.closedAt != null) then
              ((.content.closedAt | fromdateiso8601) - (.content.createdAt | fromdateiso8601)) / 86400
            else
              null
            end;
          
          def age_days:
            if (.content.createdAt != null) then
              (now - (.content.createdAt | fromdateiso8601)) / 86400
            else
              null
            end;
          
          .data.user.projectsV2.nodes[]
          | .items.nodes
          | map(select(.content != null))
          
          | {
              created: map(select(.content.createdAt != null)),
              closed: map(select(.content.closedAt != null)),
              all: .
            }
          
          # -------------------------
          # 📈 CRIADAS POR MÊS
          # -------------------------
          | "\n## 📈 Tasks Criadas por Mês",
          (
            .created
            | map(.content.createdAt | to_month(.))
            | group_by(.)
            | map({month: .[0], count: length})
            | sort_by(.month)
            | "```mermaid",
              "lineChart",
              "    title Tasks Criadas",
              "    x-axis Mês",
              "    y-axis Quantidade",
              "    data",
              ( .[] | "        \"\(.month)\": \(.count)" ),
              "```"
          ),
          
          # -------------------------
          # 🚀 FINALIZADAS POR MÊS
          # -------------------------
          "\n## 🚀 Tasks Finalizadas por Mês",
          (
            .closed
            | map(.content.closedAt | to_month(.))
            | group_by(.)
            | map({month: .[0], count: length})
            | sort_by(.month)
            | "```mermaid",
              "lineChart",
              "    title Tasks Finalizadas",
              "    x-axis Mês",
              "    y-axis Quantidade",
              "    data",
              ( .[] | "        \"\(.month)\": \(.count)" ),
              "```"
          ),
          
          # -------------------------
          # ⏱️ LEAD TIME
          # -------------------------
          "\n## ⏱️ Lead Time Médio (dias)",
          (
            .closed
            | map(. + { lt: lead_time_days })
            | map(select(.lt != null))
            | group_by(.content.createdAt[0:7])
            | map({
                month: .[0].content.createdAt[0:7],
                avg: (map(.lt) | add / length)
              })
            | sort_by(.month)
            | "```mermaid",
              "lineChart",
              "    title Lead Time Médio",
              "    x-axis Mês",
              "    y-axis Dias",
              "    data",
              ( .[] | "        \"\(.month)\": \(.avg|floor)" ),
              "```"
          ),
          
          # -------------------------
          # ⚠️ AGING
          # -------------------------
          "\n## ⚠️ Tasks Antigas (>7 dias)",
          (
            .all
            | map(. + { age: age_days })
            | map(select(.age != null and .age > 7 and .content.state == "OPEN"))
            | length
            | "- Total: \(.) tasks antigas"
          ),
          
          # -------------------------
          # 👥 PRODUTIVIDADE
          # -------------------------
          "\n## 👥 Produtividade por Responsável",
          (
            .all
            | map({
                user:
                  (
                    .content.assignees.nodes[0]?.login
                    // "Não atribuído"
                  )
              })
            | group_by(.user)
            | map("- \(.[0].user): \(length)")
            | .[]
          )
          ' report.json >> report.md

      - name: Publicar no Summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload do relatório
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-executivo
          path: report.md
