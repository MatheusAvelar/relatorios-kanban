name: Relatorio Executivo de Tasks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 28 * *" # todo dia 28 (mensal)

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Buscar dados
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api graphql -f query='
          {
            user(login: "MatheusAvelar") {
              projectsV2(first: 20) {
                nodes {
                  title
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          title
                          state
                          assignees(first: 5) {
                            nodes {
                              login
                            }
                          }
                        }
                      }
                      fieldValues(first: 10) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }' > report.json

      - name: Gerar Relatório
        run: |
          echo "# 📊 Relatório Mensal de Tasks" > report.md

          echo "## 📌 Visão Geral" >> report.md
          echo "- Total de Tasks: $(jq '[.data.user.projectsV2.nodes[].items.nodes[]] | length' report.json)" >> report.md
          echo "- Tasks Abertas: $(jq '[.data.user.projectsV2.nodes[].items.nodes[] | select(.content.state=="OPEN")] | length' report.json)" >> report.md
          echo "- Tasks Fechadas: $(jq '[.data.user.projectsV2.nodes[].items.nodes[] | select(.content.state=="CLOSED")] | length' report.json)" >> report.md

          echo "" >> report.md
          echo "## 📊 Distribuição por Status" >> report.md

          jq -r '
          [.data.user.projectsV2.nodes[].items.nodes[]]
          | group_by(.fieldValues.nodes[0]?.name)
          | map({
              status: (.[0].fieldValues.nodes[0]?.name // "Sem Status"),
              count: length
            })
          | .[] | "- \(.status): \(.count)"
          ' report.json >> report.md

          echo "" >> report.md
          echo "## 👤 Distribuição por Responsável" >> report.md

          jq -r '
          [.data.user.projectsV2.nodes[].items.nodes[]]
          | group_by(.content.assignees.nodes[0]?.login)
          | map({
              user: (.[0].content.assignees.nodes[0]?.login // "Não atribuído"),
              count: length
            })
          | .[] | "- \(.user): \(.count)"
          ' report.json >> report.md

          echo "" >> report.md
          echo "## 🚨 Insights" >> report.md

          echo "- Tasks sem responsável: $(jq '[.data.user.projectsV2.nodes[].items.nodes[] | select(.content.assignees.nodes | length == 0)] | length' report.json)" >> report.md

          echo "- Tasks abertas (atenção): $(jq '[.data.user.projectsV2.nodes[].items.nodes[] | select(.content.state=="OPEN")] | length' report.json)" >> report.md

      - name: Publicar no Summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-executivo
          path: report.md
