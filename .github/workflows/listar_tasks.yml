name: Relatorio por Status e Responsavel

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Buscar dados
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🔍 Buscando dados..."

          gh api graphql -f query='
          {
            user(login: "MatheusAvelar") {
              projectsV2(first: 20) {
                nodes {
                  title
                  items(first: 100) {
                    nodes {
                      content {
                        ... on Issue {
                          title
                          state
                          url
                          assignees(first: 5) {
                            nodes {
                              login
                            }
                          }
                        }
                      }
                      fieldValues(first: 10) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }' > report.json

      - name: Gerar Markdown agrupado
        run: |
          echo "# 📊 Relatório por Status e Responsável" > report.md

          jq -r '
          .data.user.projectsV2.nodes[] as $proj |

          "## 🗂 Projeto: \($proj.title)\n" +

          (
            # Agrupa por Status
            ($proj.items.nodes | group_by(.fieldValues.nodes[0]?.name))[] as $status_group |

            "\n### 📌 Status: \($status_group[0].fieldValues.nodes[0]?.name // "Sem Status")\n" +

            (
              # Agrupa por responsável dentro do status
              ($status_group | group_by(.content.assignees.nodes[0]?.login))[] as $user_group |

              "\n👤 Responsável: \($user_group[0].content.assignees.nodes[0]?.login // "Não atribuído")\n" +

              (
                $user_group[] |
                "- \(.content?.title // "Sem título")"
              )
            )
          )
          ' report.json >> report.md

      - name: Exibir
        run: cat report.md

      - name: Publicar no Summary
        run: |
          cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-agrupado
          path: report.md
